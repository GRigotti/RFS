{% extends 'ferramentaria/base.html' %}
{% load static %}
{% block extra_css %}
        <link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block title %}Login - FRAMES{% endblock %}
{% block content %}


<div class="login-container">
    <div class="login-box">
        <h2>Acesso Restrito</h2>
        
        {% if form.errors %}
            <div class="login-error">
                Usuário ou senha incorretos. Tente novamente.
            </div>
        {% endif %}

        <form method="POST" >
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            
            <div class="login-group">
                <label for="id_username">Usuário (Matrícula ou Login)</label>
                <input type="text" name="username" id="id_username" required autofocus autocomplete="username">
            </div>
            
            <div class="login-group">
                <label for="id_password">Senha</label>
                <input type="password" name="password" id="id_password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login">🔒 Entrar</button>
            <input type="hidden" name="next" value="{{ request.GET.next }}">
        </form>
        
        
    </div>
</div>
{% endblock %}
