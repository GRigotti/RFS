<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soprano - CMMS Ferramentaria</title>
    <style>
        /* Reset básico e fontes */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4eaeb; } /* Fundo levemente avermelhado do seu protótipo */

        /* Barra Lateral (Menu) */
        .sidebar {
            width: 250px;
            background-color: #1a3c5e; /* Azul escuro da Soprano */
            color: white;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }
        .sidebar h2 { text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 16px;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }
        .sidebar a:hover { background-color: #11273d; border-left: 4px solid #4a90e2; }

        /* Área de Conteúdo Principal */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Cabeçalho Superior */
        .header {
            background-color: #1a3c5e;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Onde o conteúdo das outras telas será injetado */
        .content-area {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>≡ MENU</h2>
        <a href="{% url 'ferramentaria:dashboard' %}">📊 Dashboard</a>
        <a href="{% url 'ferramentaria:historico' %}">📋 Histórico e OS</a>
        <a href="{% url 'ferramentaria:gerenciamento' %}">⚙️ Gerenciamento</a>
    </aside>

    <div class="main-content">
        <header class="header">
            Soprano
        </header>

        <main class="content-area">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>
</html>
