<div id="modalNovaOS" class="modal-overlay">
    <div class="modal-content">
        <span class="modal-close" onclick="fecharModal('modalNovaOS')">&times;</span>
        <h2>Nova Solicitação</h2>
        <hr style="margin-bottom: 15px;">
        
        <form method="POST" action="">
            {% csrf_token %}
            <input type="hidden" name="tipo_acao" value="nova_solicitacao">
            
            <div class="form-group">
                <label>Molde</label>
                <select name="molde_id" class="select2-modal" required>>
                    <option value="">Selecione o Molde...</option>
                    {% for molde in lista_moldes %}
                        <option value="{{ molde.id }}">{{ molde.molde_nome }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>IN</label>
                <select name="inValor" class="select2-modal" required>
                    <option value="">Selecione o IN (Opcional)...</option>
                    {% for item in itens_molde %}
                        {% if item.cod_complementar %}
                            <option value="{{ item.id }}">{{ item.cod_complementar }} - {{ item.item_codigo }}</option>
                        {% endif %}
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Máquina</label>
                <select name="maquina_id" class="select2-modal" required>
                    <option value="">Selecione a Máquina...</option>
                    {% for maq in lista_maquinas %}
                        <option value="{{ maq.id_maquina }}">{{ maq.maquina }}</option>
                    {% endfor %}
                </select>
            </div>
            <!--Campo para digitar a quantidade produzida-->
            <!--div class="form-group" style="margin-bottom: 15px;">
                <label style="color: #004B78; font-weight: bold; font-size: 0.95rem; display: block; margin-bottom: 5px;">
                    Quantidade Produzidas:
                </label>
                <input type="number" name="pecas_produzidas" min="0" placeholder="Ex: 15000" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem;">
            </div-->

            <div class="form-group">
                <label>Operador</label>
                <select name="operador_id" required>
                    <option value="">Selecione o Colaborador...</option>
                    {% for colab in lista_operadores %}
                        <option value="{{ colab.id }}">{{ colab.nome }} - {{ colab.funcao }}</option>
                    {% endfor %}
                </select>
            </div>

           <!-- <div class="form-group">
                <label>Ordem de Produção (OP)</label>
                <input type="text" name="ordem_producao" placeholder="Ex: OP-54321" required>
            </div>

            <div class="form-group">
                <label>Data da OP</label>
                <input type="date" name="data_op" required>
            </div>
        -->
            <div class="form-group">
                <label >Ordem de Manutenção</label>
                <input type="text" id="ordem_manutencao" name="ordem_manutencao" 
                    placeholder="Ex: OM-2026-001" 
                    style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label>Problemas Identificados</label>
                <div class="grid-check-container">
                    {% for prob in lista_problemas %}
                        <label class="checkbox-container-label">
                            <input type="checkbox" name="problemas_ids" value="{{ prob.id }}"> {{ prob.problema }}
                        </label>
                    {% empty %}
                        <span style="color: #666; font-size: 0.9em;">Nenhum problema cadastrado.</span>
                    {% endfor %}
                </div>
            </div>

            <div class="form-group">
                <label>Parecer do Operador</label>
                <textarea name="parecer_producao" rows="2" placeholder="Detalhes extras sobre a falha..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Salvar Solicitação</button>
        </form>
    </div>
</div>
